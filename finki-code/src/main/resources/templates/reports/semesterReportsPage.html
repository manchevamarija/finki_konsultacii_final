<!DOCTYPE html>
<html lang="en" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{layout}">
<head>
    <meta charset="UTF-8">
    <title>Извештај по семестар</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
</head>
<body>

<div layout:fragment="content">
    <div class="container mt-4 mb-5">
        <div class="d-flex align-items-center mb-4">
            <i class="fas fa-chart-bar fs-1 me-3 text-primary-custom"></i>
            <div>
                <h2 class="mb-0">Извештај на консултации по семестар</h2>
            </div>
        </div>

        <div class="card shadow-sm p-0 mb-4">
            <div class="card-header bg-light">
                <h5 class="mb-0">
                    <i class="fas fa-filter me-2"></i>Филтри
                </h5>
            </div>
            <div class="card-body">
                <form th:action="@{/reports/semester}" method="get">
                    <div class="row g-3">
                        <div class="col-lg-3 col-md-6">
                            <label class="form-label fw-semibold">
                                <i class="fas fa-user-tie text-primary-custom me-2"></i>Професор
                            </label>
                            <input type="text" class="form-control" name="professorId"
                                   placeholder="Внеси професор" th:value="${param.professorId}">
                        </div>

                        <div class="col-lg-3 col-md-6">
                            <label class="form-label fw-semibold">
                                <i class="fas fa-hashtag text-primary-custom me-2"></i>Број на консултации
                            </label>
                            <input type="number" class="form-control" name="consultationsNumber"
                                   placeholder="Минимален број" th:value="${param.consultationsNumber}"
                                   min="0">
                        </div>

                        <div class="col-lg-4 col-md-6">
                            <label class="form-label fw-semibold">
                                <i class="fas fa-calendar-alt text-primary-custom me-2"></i>Семестар
                            </label>
                            <select class="form-select" name="semesterCode">
                                <option value="">Избери семестар</option>
                                <option th:each="s : ${semesters}"
                                        th:selected="${param.semesterCode!=null && s.code == param.semesterCode[0]}"
                                        th:value="${s.code}" th:text="${s.code}"></option>
                            </select>
                        </div>

                        <div class="col-lg-2 col-md-6 d-flex align-items-end">
                            <button type="submit" class="btn btn-primary-custom w-100">
                                <i class="fas fa-search me-2"></i>Филтрирај
                            </button>
                        </div>
                    </div>
                </form>
            </div>
        </div>

        <div class="card shadow-sm p-0">
            <div class="card-header bg-light d-flex justify-content-between align-items-center">
                <h5 class="mb-0">
                    <i class="fas fa-table me-2"></i>Резултати
                </h5>
                <span class="badge bg-primary-custom rounded-pill" th:if="${page != null}">
                    <i class="fas fa-list me-1"></i>
                    Вкупно: <span th:text="${page.getTotalElements()}">0</span>
                </span>
            </div>
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-hover align-middle mb-0">
                        <thead class="table-light">
                        <tr>
                            <th class="px-4 py-3">
                                <i class="fas fa-calendar me-2"></i>Семестар
                            </th>
                            <th class="px-4 py-3">
                                <i class="fas fa-clock me-2"></i>Период
                            </th>
                            <th class="px-4 py-3">
                                <i class="fas fa-user-tie me-2"></i>Професор
                            </th>
                            <th class="px-4 py-3 text-center">
                                <i class="fas fa-calendar-check me-2"></i>Број на консултации
                            </th>
                            <th class="px-4 py-3 text-center">
                                <i class="fas fa-users me-2"></i>Пријавени студенти
                            </th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="c : ${page.getContent()}">
                            <td class="px-4 py-3">
                                <span class="badge bg-secondary" th:text="${c.getSemester()}"></span>
                            </td>
                            <td class="px-4 py-3">
                                <small class="text-muted">
                                    <i class="fas fa-calendar-day me-1"></i>
                                    <span th:text="${#temporals.format(c.semesterStart, 'dd.MM.yyyy')}"></span>
                                    <i class="fas fa-arrow-right mx-1"></i>
                                    <span th:text="${#temporals.format(c.semesterEnd, 'dd.MM.yyyy')}"></span>
                                </small>
                            </td>
                            <td class="px-4 py-3">
                                <a th:href="@{/reports/semester(professorId=${c.professor?.id})}"
                                   class="text-decoration-none fw-semibold">
                                    <span th:text="${c.professor?.name}"></span>
                                </a>
                            </td>
                            <td class="px-4 py-3 text-center">
                                <span class="fs-6 px-3 py-2 fw-semibold"
                                      th:text="${c.numberOfConsultations}">0</span>
                            </td>
                            <td class="px-4 py-3 text-center">
                                <span class="fs-6 px-3 py-2 fw-semibold"
                                      th:text="${c.numberOfAttendances}">0</span>
                            </td>
                        </tr>
                        <tr th:if="${page == null || page.getTotalElements() == 0}">
                            <td colspan="5" class="text-center py-5">
                                <i class="fas fa-inbox fs-1 text-muted mb-3 d-block"></i>
                                <p class="text-muted mb-0">Нема резултати за избраните филтри</p>
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <div th:if="${page != null && page.getTotalElements() > 0}"
             th:insert="~{fragments/paging :: pageSection(${page})}" class="mt-4"></div>
    </div>
</div>

</body>
</html>
