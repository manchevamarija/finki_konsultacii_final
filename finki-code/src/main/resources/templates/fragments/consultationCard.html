<div th:fragment="consultationCard(consultation, attendance, attendanceCount, professor, isIrregular)"
     th:with="isRegistered=${attendance != null}" xmlns:sec="http://www.thymeleaf.org/thymeleaf-extras-springsecurity6">

    <div th:class="${isRegistered} ? 'consultation-card registered' : 'consultation-card'">

        <div th:if="${isRegistered}" class="registered-badge">
            <i class="fas fa-check-circle"></i>
            Пријавени сте
        </div>

        <form th:unless="${isRegistered}" action="/consultations/schedule" method="post">
            <input type="hidden" name="professorId" th:value="${professor.id}"/>
            <input type="hidden" name="consultationTermId" th:value="${consultation.id}">

            <div class="row">
                <div th:replace="~{fragments/consultationCard :: infoColumn(${consultation}, ${attendanceCount})}"></div>
                <div th:replace="~{fragments/consultationCard :: signupColumn(${consultation})}"></div>
            </div>
        </form>

        <div th:if="${isRegistered}" class="row">
            <div th:replace="~{fragments/consultationCard :: infoColumnRegistered(${consultation}, ${attendance}, ${attendanceCount}, ${professor})}"></div>
            <div th:replace="~{fragments/consultationCard :: commentsColumn(${consultation}, ${attendance}, ${professor})}"></div>
        </div>
    </div>
</div>

<th:block th:fragment="consultationInfo(consultation, attendanceCount)">
    <div class="info-item">
        <i class="fas fa-calendar-alt"></i>
        <div>
            <strong>Датум</strong><br>
            <span th:text="|${consultation.getFormattedOneTimeDate()} (${consultation.getDayOfWeek()})|"></span>
        </div>
    </div>

    <div class="info-item">
        <i class="fas fa-clock"></i>
        <div>
            <strong>Време</strong><br>
            <span th:text="|${consultation.startTime} - ${consultation.endTime}|"></span>
        </div>
    </div>

    <div class="info-item">
        <i class="fas fa-door-open"></i>
        <div>
            <strong>Локација</strong><br>
            <span th:unless="${consultation.online == null}"
                  th:text="${consultation.room.type == 'VIRTUAL' ? 'Online' : consultation.room.name + (consultation.online ? ', Онлајн' : '')}"></span>
            <span th:if="${consultation.online == null}"
                  th:text="${consultation.room.type == 'VIRTUAL' ? 'Online' : consultation.room.name}"></span>
        </div>
    </div>

    <div th:unless="${consultation.meetingLink == null || #strings.isEmpty(consultation.meetingLink)}" class="info-item">
        <i class="fas fa-link"></i>
        <div>
            <strong>Линк</strong><br>
            <a th:href="${consultation.meetingLink}"
               th:text="${#strings.abbreviate(consultation.meetingLink, 50)}"
               target="_blank"
               th:title="${consultation.meetingLink}"></a>
        </div>
    </div>

    <div class="info-item">
        <i class="fas fa-users"></i>
        <div>
            <strong>Пријавени студенти</strong><br>
            <div class="mt-1">
                <span class="student-count-badge">
                    <i class="fas fa-user-check me-1"></i>
                    <span th:text="${attendanceCount}">0</span>
                </span>
            </div>
        </div>
    </div>

    <div th:unless="${consultation.studentInstructions == null}" class="info-item">
        <i class="fas fa-clipboard-list"></i>
        <div>
            <strong>Инструкции</strong><br>
            <span th:text="${consultation.studentInstructions}"></span>
        </div>
    </div>
</th:block>

<div th:fragment="infoColumn(consultation, attendanceCount)" class="col-lg-5 col-md-6">
    <th:block th:replace="~{fragments/consultationCard :: consultationInfo(${consultation}, ${attendanceCount})}"></th:block>
</div>

<div th:fragment="infoColumnRegistered(consultation, attendance, attendanceCount, professor)" class="col-lg-5 col-md-6">
    <th:block th:replace="~{fragments/consultationCard :: consultationInfo(${consultation}, ${attendanceCount})}"></th:block>

    <div th:if="${consultation.isMoreThanTwoHoursAway()}" class="mt-3">
        <form action="/consultations/cancel" method="post"
              onsubmit="return confirmAction(this, 'Дали сте сигурни дека сакате да го откажете присуството?')">
            <input type="hidden" name="attendanceId" th:value="${attendance.id}"/>
            <input type="hidden" name="professorId" th:value="${professor.id}"/>
            <button type="submit" class="btn btn-cancel fw-semibold w-100">
                <i class="fas fa-times me-2"></i>Откажи присуство
            </button>
        </form>
    </div>
</div>

<div th:fragment="signupColumn(consultation)" class="col-lg-7 col-md-6">
    <div th:if="${consultation.isMoreThanTwoHoursAway()}" sec:authorize="hasAnyRole('ROLE_STUDENT')">
        <label class="form-label fw-semibold mb-2">
            <i class="fas fa-comment-dots me-2 text-primary-custom"></i>
            Причина за консултации
        </label>
        <textarea name="comment" class="form-control mb-3"
                  placeholder="Опишете ја причината за консултации (максимум 500 карактери)..."
                  maxlength="500" rows="4"></textarea>

        <button type="submit" class="btn btn-primary-custom fw-semibold w-100">
            <i class="fas fa-calendar-check me-2"></i>Пријави се
        </button>
    </div>
</div>

<div th:fragment="commentsColumn(consultation, attendance, professor)" class="col-lg-7 col-md-6">
    <div th:replace="~{fragments/comments :: commentsBlock(${attendance.comments})}"></div>

    <div th:unless="${consultation.isEnded()}">
        <form action="/consultations/add-comment" method="post" class="d-flex align-items-start comment-form-mobile gap-2 mt-2">
            <input type="hidden" name="attendanceId" th:value="${attendance.id}"/>
            <input type="hidden" name="professorId" th:value="${professor.id}"/>
            <input type="hidden" name="consultationId" value=""/>

            <textarea name="newComment" class="form-control"
                      placeholder="Додај дополнителен коментар..."
                      maxlength="500" rows="3" style="flex: 1;"></textarea>

            <button type="submit" class="btn btn-primary-custom fw-semibold">
                <i class="fas fa-plus me-1"></i>Додај
            </button>
        </form>
    </div>
</div>

<div th:fragment="sectionHeader(title, icon, bgClass)" th:class="'section-header ' + ${bgClass} + ' mt-4'">
    <div>
        <h5 class="mb-0">
            <i th:class="${icon} + ' me-2'"></i><span th:text="${title}"></span>
        </h5>
    </div>
    <span>
        <i class="fas fa-info-circle" style="cursor: pointer; font-size: 1.25rem;"
           data-bs-toggle="tooltip" data-bs-placement="left"
           title="Доколку се пријавите, професорот автоматски ќе биде известен за Вашето присуство по mail. Пријавување/Откажување на термин е можно најмалку 2 часа пред почетокот на консултациите."></i>
    </span>
</div>
