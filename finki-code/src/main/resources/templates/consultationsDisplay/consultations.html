
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}" lang="en"
      xmlns:sec="http://www.thymeleaf.org/thymeleaf-extras-springsecurity6">
<head>
    <title>FINKI Consultations</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <script th:replace="~{fragments/confirmModal :: confirmModalScript}"></script>
    <script>
        $(document).ready(function () {
            $('[data-bs-toggle="tooltip"]').tooltip();
        });
    </script>
    <link th:href="@{/css/consultations.css}" rel="stylesheet">
</head>
<body>
<div class="mt-4" layout:fragment="content">
    <div th:replace="~{fragments/confirmModal :: confirmModal}"></div>

    <div class="container pt-2 pb-4">
        <div class="">
            <h2 class="mb-0">
                <i class="fas fa-user-tie me-3"></i>
                <span th:text="${professor.name}"></span>
            </h2>
        </div>

        <div th:unless="${#lists.isEmpty(irregularPage.getContent())}">
            <div th:replace="~{fragments/consultationCard :: sectionHeader('Дополнителни консултации', 'fas fa-calendar-day', 'irregular bg-light')}"></div>

            <div th:each="consultation : ${irregularPage.getContent()}">
                <div th:replace="~{fragments/consultationCard :: consultationCard(
    ${consultation},
    ${consultationAttendanceMap[consultation.id]},
    ${consultation.attendanceCount},
    ${professor},
    true
)}"></div>
            </div>

            <div th:insert="~{fragments/irregularPaging :: pageSection(${irregularPage})}" class="mb-4"></div>
        </div>

        <div th:unless="${#lists.isEmpty(regularPage.getContent())}">
            <div th:replace="~{fragments/consultationCard :: sectionHeader('Редовни консултации', 'fas fa-calendar-week', '')}"></div>

            <div th:each="consultation : ${regularPage.getContent()}">
                <div th:replace="~{fragments/consultationCard :: consultationCard(
    ${consultation},
    ${consultationAttendanceMap[consultation.id]},
    ${consultation.attendanceCount},
    ${professor},
    true
)}"></div>
            </div>

            <div th:insert="~{fragments/regularPaging :: pageSection(${regularPage})}" class="mb-4"></div>
        </div>

        <div th:if="${#lists.isEmpty(regularPage.getContent()) and #lists.isEmpty(irregularPage.getContent())}"
             class="text-center py-5">
            <i class="fas fa-calendar-times fa-4x text-muted mb-3"></i>
            <h5 class="text-muted">Нема закажани консултации. Ве молиме контактирајте го професорот по е-пошта за да договорите термин.</h5>
        </div>
    </div>
</div>

<script>
    var tooltipTriggerList = [].slice.call(document.querySelectorAll('[data-bs-toggle="tooltip"]'))
    var tooltipList = tooltipTriggerList.map(function (tooltipTriggerEl) {
        return new bootstrap.Tooltip(tooltipTriggerEl)
    })
</script>
</body>
</html>
