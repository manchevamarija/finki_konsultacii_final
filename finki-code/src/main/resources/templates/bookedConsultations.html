<th:block xmlns:th="http://www.thymeleaf.org">
    <div class="container">
        <div>
            <div class="d-flex align-items-center mb-4">
                <i class="fas fa-calendar-check  fs-3 me-3"></i>
                <h4 class="mb-0">Пријавени идни консултации</h4>
            </div>

            <div class="row justify-content-center" th:if="${!page.isEmpty()}">
                <div class="desktop-table-view">
                    <div class="card shadow-sm p-0">
                        <div class="card-body p-0">
                            <div class="table-responsive rounded-3">
                                <table class="table table-hover align-middle mb-0">
                                    <thead class="table-light">
                                    <tr>
                                        <th class="col-auto px-4 py-3">
                                            <i class="fas fa-calendar me-2"></i>Ден
                                        </th>
                                        <th class="col-auto px-4 py-3">
                                            <i class="fas fa-clock me-2"></i>Време
                                        </th>
                                        <th class="col-auto px-4 py-3">
                                            <i class="fas fa-door-open me-2"></i>Просторија
                                        </th>
                                        <th class="col-auto px-4 py-3">
                                            <i class="fas fa-tag me-2"></i>Тип
                                        </th>
                                        <th class="col-auto px-4 py-3">
                                            <i class="fas fa-user-tie me-2"></i>Професор
                                        </th>
                                        <th class="col-2 px-4 py-3">
                                            <i class="fas fa-comment me-2"></i>Коментар
                                        </th>
                                    </tr>
                                    </thead>
                                    <tbody>
                                    <tr th:each="attendance : ${page.getContent()}">
                                        <td class="col-auto px-4 py-3">
                                            <div class="d-flex align-items-center">
                                                <span th:text="${attendance.consultation.getFormattedOneTimeDate()}+ ' (' + #{${attendance.consultation.getDayOfWeek().toString().toLowerCase()}} + ')'"></span>
                                            </div>
                                        </td>
                                        <td class="col-auto px-4 py-3">
                                            <div class="d-flex align-items-center">
                                                <span th:text="${attendance.consultation.startTime} + ' - ' + ${attendance.consultation.endTime}"></span>
                                            </div>
                                        </td>
                                        <td class="col-auto px-4 py-3">
                                            <th:block th:unless="${attendance.consultation.online==null}">
                                                <div class="d-flex align-items-center">
                                                    <span th:if="${attendance.consultation.room.type == 'VIRTUAL'}" class="badge bg-info-custom">
                                                    Online
                                                </span>
                                                    <span th:unless="${attendance.consultation.room.type == 'VIRTUAL'}">
                                                    <span th:text="${attendance.consultation.room.name}"></span>
                                                    <span th:if="${attendance.consultation.online}" class="">
                                                         и Онлајн
                                                    </span>
                                                </span>
                                                </div>
                                            </th:block>
                                            <th:block th:if="${attendance.consultation.online==null}">
                                                <div class="d-flex align-items-center">
                                            <span th:if="${attendance.consultation.room.type == 'VIRTUAL'}" class="badge bg-info-custom">
                                                    <i class="fas fa-wifi me-1"></i>Online
                                                </span>
                                                    <span th:unless="${attendance.consultation.room.type == 'VIRTUAL'}" th:text="${attendance.consultation.room.name}"></span>
                                                </div>
                                            </th:block>
                                        </td>
                                        <td class="col-auto px-4 py-3">
                                           <span th:if="${attendance.consultation.getType().toString() == 'WEEKLY'}" class="badge bg-success-custom  badge-custom">
                                        <span th:text="${attendance.consultation.getTranslatedType()}"></span>
                                    </span>
                                            <span th:if="${attendance.consultation.getType().toString() == 'ONE_TIME'}" class="badge bg-warning-custom text-dark badge-custom">
                                        <span th:text="${attendance.consultation.getTranslatedType()}"></span>
                                    </span>
                                        </td>
                                        <td class="col-auto px-4 py-3">
                                            <div class="d-flex align-items-center">
                                                <span class="fw-semibold" th:text="${attendance.consultation.professor.name}"></span>
                                            </div>
                                        </td>
                                        <td class="col-4 px-4 py-3">
                                          <div th:replace="~{fragments/comments :: commentsBlock(${attendance.comments})}"></div>

                                          <div th:if="${!attendance.consultation.isActive() and attendance.consultation!=null}" class="mt-2">
                                            <span class="p-2">
                                                <i class="fas fa-ban me-1 text-danger"></i>Консултациите се <strong>откажани</strong>
                                            </span>
                                            </div>
                                        </td>
                                    </tr>
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </div>

            </div>

            <div class="row justify-content-center" th:if="${page.isEmpty()}">
                <div class="desktop-table-view">
                    <div class="card shadow-sm p-0">
                        <div class="card-body text-center pb-2">
                            <p class="text-muted">Нема пријавени консултации.</p>
                        </div>
                    </div>
                </div>

            </div>
            <div th:if="${!page.isEmpty()}" th:insert="~{fragments/smallPaging :: pageSection(${page})}" class="mt-4"></div>
            <hr>
        </div>
    </div>
</th:block>
